<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini SIEM Dashboard</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
      <div>
        <h1 class="dashboard-title mb-1">Mini SIEM Dashboard</h1>
        <p class="dashboard-subtitle mb-0">Security Onion Monitoring</p>
      </div>
      <span id="statusBadge" class="badge rounded-pill text-bg-secondary px-3 py-2">
        Checking...
      </span>
    </div>

    <div class="row g-3 mb-4">
      <div class="col-12 col-md-6 col-xl-3">
        <div class="card dashboard-card metric-card">
          <div class="card-body">
            <p class="metric-label">Total Events (24h)</p>
            <h2 id="totalAlerts" class="metric-value text-info">0</h2>
          </div>
        </div>
      </div>
      <div class="col-12 col-md-6 col-xl-3">
        <div class="card dashboard-card metric-card">
          <div class="card-body">
            <p class="metric-label">Critical</p>
            <h2 id="criticalCount" class="metric-value text-danger">0</h2>
          </div>
        </div>
      </div>
      <div class="col-12 col-md-6 col-xl-3">
        <div class="card dashboard-card metric-card">
          <div class="card-body">
            <p class="metric-label">High</p>
            <h2 id="highCount" class="metric-value text-warning">0</h2>
          </div>
        </div>
      </div>
      <div class="col-12 col-md-6 col-xl-3">
        <div class="card dashboard-card metric-card">
          <div class="card-body">
            <p class="metric-label">Medium</p>
            <h2 id="mediumCount" class="metric-value text-gold">0</h2>
          </div>
        </div>
      </div>
    </div>

    <div class="row g-3 mb-4">
      <div class="col-12 col-lg-8">
        <div class="card dashboard-card h-100">
          <div class="card-body">
            <h5 class="section-title">Timeline 24 Hours</h5>
            <div id="timelineChart" class="chart-box"></div>
          </div>
        </div>
      </div>

      <div class="col-12 col-lg-4">
        <div class="card dashboard-card h-100">
          <div class="card-body">
            <h5 class="section-title">Top Source IPs</h5>
            <div id="topIpsList" class="list-group list-group-flush"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="card dashboard-card">
      <div class="card-body">
        <h5 class="section-title">Recent Alerts / Events</h5>
        <div class="table-responsive">
          <table class="table table-dark table-hover align-middle">
            <thead>
              <tr>
                <th>Time</th>
                <th>Severity</th>
                <th>Source IP</th>
                <th>Port</th>
                <th>Signature</th>
              </tr>
            </thead>
            <tbody id="alertsTableBody">
              <tr>
                <td colspan="5" class="text-center text-secondary">Loading data...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="footer-note mt-3 text-center" id="footerInfo">
      Waiting for dashboard data...
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
